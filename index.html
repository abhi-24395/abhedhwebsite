<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>abhedh.in</title>
<meta name="description" content="abhedh.in — coming soon."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0b0b0d;
  --text:#f5f6f8;
  --text-2:#9395a0;
  --text-3:#5d5f6a;
  --accent:#0ea5e9;
  --line:#1c1d24;
  --font:'Inter',system-ui,sans-serif;
  --display:'Instrument Serif',Georgia,serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font);
  color:var(--text-2);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:2rem;
  position:relative;
  overflow:hidden;
}
.bp{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 100% 80% at 50% 50%,#000 30%,transparent 90%);-webkit-mask-image:radial-gradient(ellipse 100% 80% at 50% 50%,#000 30%,transparent 90%)}
.spot{position:fixed;width:60vw;height:60vw;max-width:600px;max-height:600px;border-radius:50%;background:radial-gradient(circle,var(--accent) 0%,transparent 60%);filter:blur(120px);opacity:.18;top:-20%;right:-15%;z-index:0;pointer-events:none}
main{position:relative;z-index:1;text-align:center;max-width:520px}
.tag{font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-3);margin-bottom:1.5rem}
h1{font-family:var(--display);font-weight:400;font-size:clamp(3rem,9vw,5.5rem);line-height:1;color:var(--text);margin-bottom:1.5rem}
h1 em{font-style:italic;color:var(--accent)}
p{font-size:1rem;line-height:1.6;max-width:36ch;margin:0 auto 2rem}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:.6rem;vertical-align:middle;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
footer{position:fixed;bottom:1.5rem;left:0;right:0;text-align:center;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-3);z-index:1}
</style>
</head>
<body>
<div class="bp"></div>
<div class="spot"></div>
<main>
  <div class="tag"><span class="dot"></span>In progress</div>
  <h1>abhedh<em>.</em>in</h1>
  <p>Something is being put together here. Check back soon.</p>
</main>
<footer>abhedh.in &middot; 2026</footer>
</body>
</html>
